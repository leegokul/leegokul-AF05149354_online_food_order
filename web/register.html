<!DOCTYPE html>
<html>
<head>
    <title>Customer Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="video-page">

<video autoplay muted loop class="video-bg">
    <source src="videos/foodbg.mp4"
            type="video/mp4">
</video>

<div class="overlay"></div>

<form action="register" method="post">

    <h2> Customer Registration</h2>

    Full Name:<br>
    <input type="text"
           name="fullname"
           required>

    <br><br>

    Email:<br>
    <input type="email"
           name="email"
           required>

    <br><br>

    Password:<br>
    <input type="password"
           name="password"
           required>

    <br><br>

    Phone:<br>
    <input type="text"
           name="phone"
           required>

    <br><br>

    <input type="submit"
           value="Register">

    <br><br>

    Already Registered?

    <a href="login.html">
        Login Here
    </a>

</form>

</body>
</html>
